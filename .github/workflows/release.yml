name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

env:
  APP_ID: ZBecknell.Runner
  APP_TITLE: Runner
  APP_AUTHORS: Runner
  REPO_URL: https://github.com/zbecknell/Runner
  PROJECT_PATH: src/Runner.App/Runner.App.csproj

jobs:
  package:
    name: Package ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            channel: win-x64
            main_exe: Runner.exe
            icon: src/Runner.App/Assets/avalonia-logo.ico
            platform: windows
          - os: macos-latest
            rid: osx-arm64
            channel: osx-arm64
            main_exe: Runner
            icon: src/Runner.App/Assets/runner.icns
            platform: macos
          - os: macos-latest
            rid: osx-x64
            channel: osx-x64
            main_exe: Runner
            icon: src/Runner.App/Assets/runner.icns
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Set version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          "VERSION=$version" >> $env:GITHUB_ENV

      - name: Validate Windows signing secrets
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
        run: |
          $required = @(
            "AZURE_CLIENT_ID",
            "AZURE_TENANT_ID",
            "AZURE_SUBSCRIPTION_ID",
            "AZURE_TRUSTED_SIGNING_ENDPOINT",
            "AZURE_TRUSTED_SIGNING_ACCOUNT",
            "AZURE_TRUSTED_SIGNING_CERT_PROFILE"
          )

          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              Write-Error "Missing required repository secret: $name"
              exit 1
            }
          }

      - name: Azure login for Windows signing
        if: matrix.platform == 'windows'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Windows signing metadata
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
        run: |
          $metadataPath = Join-Path $env:RUNNER_TEMP "trusted-signing-metadata.json"
          @{
            Endpoint = $env:AZURE_TRUSTED_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:AZURE_TRUSTED_SIGNING_ACCOUNT
            CertificateProfileName = $env:AZURE_TRUSTED_SIGNING_CERT_PROFILE
          } | ConvertTo-Json | Set-Content -Path $metadataPath -Encoding utf8NoBOM
          "WINDOWS_SIGNING_METADATA=$metadataPath" >> $env:GITHUB_ENV

      - name: Validate macOS signing secrets
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MACOS_CERT_APP_BASE64: ${{ secrets.MACOS_CERT_APP_BASE64 }}
          MACOS_CERT_INSTALLER_BASE64: ${{ secrets.MACOS_CERT_INSTALLER_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_SIGN_APP_IDENTITY: ${{ secrets.MACOS_SIGN_APP_IDENTITY }}
          MACOS_SIGN_INSTALL_IDENTITY: ${{ secrets.MACOS_SIGN_INSTALL_IDENTITY }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          required=(
            MACOS_CERT_APP_BASE64
            MACOS_CERT_INSTALLER_BASE64
            MACOS_CERT_PASSWORD
            MACOS_SIGN_APP_IDENTITY
            MACOS_SIGN_INSTALL_IDENTITY
            MACOS_NOTARY_APPLE_ID
            MACOS_NOTARY_TEAM_ID
            MACOS_NOTARY_PASSWORD
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required repository secret: $name"
              exit 1
            fi
          done

      - name: Install macOS signing certificates
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MACOS_CERT_APP_BASE64: ${{ secrets.MACOS_CERT_APP_BASE64 }}
          MACOS_CERT_INSTALLER_BASE64: ${{ secrets.MACOS_CERT_INSTALLER_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          APP_CERT_PATH="$RUNNER_TEMP/developer-id-application.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/developer-id-installer.p12"

          echo "$MACOS_CERT_APP_BASE64" | base64 --decode > "$APP_CERT_PATH"
          echo "$MACOS_CERT_INSTALLER_BASE64" | base64 --decode > "$INSTALLER_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$APP_CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$INSTALLER_CERT_PATH" -P "$MACOS_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          xcrun notarytool store-credentials "runner-notary" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --keychain "$KEYCHAIN_PATH"

          echo "MACOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime "${{ matrix.rid }}" `
            --self-contained true `
            -p:Version=$env:VERSION `
            --output "artifacts/publish/${{ matrix.rid }}"

      - name: Pack Windows release
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          vpk pack `
            --packId $env:APP_ID `
            --packTitle $env:APP_TITLE `
            --packAuthors $env:APP_AUTHORS `
            --packVersion $env:VERSION `
            --packDir "artifacts/publish/${{ matrix.rid }}" `
            --mainExe "${{ matrix.main_exe }}" `
            --runtime "${{ matrix.rid }}" `
            --channel "${{ matrix.channel }}" `
            --outputDir "artifacts/releases/${{ matrix.rid }}" `
            --icon "${{ matrix.icon }}" `
            --azureTrustedSignFile "$env:WINDOWS_SIGNING_METADATA"

      - name: Pack macOS release
        if: matrix.platform == 'macos'
        shell: bash
        env:
          MACOS_SIGN_APP_IDENTITY: ${{ secrets.MACOS_SIGN_APP_IDENTITY }}
          MACOS_SIGN_INSTALL_IDENTITY: ${{ secrets.MACOS_SIGN_INSTALL_IDENTITY }}
        run: |
          vpk pack \
            --packId "$APP_ID" \
            --packTitle "$APP_TITLE" \
            --packAuthors "$APP_AUTHORS" \
            --packVersion "$VERSION" \
            --packDir "artifacts/publish/${{ matrix.rid }}" \
            --mainExe "${{ matrix.main_exe }}" \
            --runtime "${{ matrix.rid }}" \
            --channel "${{ matrix.channel }}" \
            --outputDir "artifacts/releases/${{ matrix.rid }}" \
            --icon "${{ matrix.icon }}" \
            --bundleId "com.zbecknell.runner" \
            --signAppIdentity "$MACOS_SIGN_APP_IDENTITY" \
            --signInstallIdentity "$MACOS_SIGN_INSTALL_IDENTITY" \
            --notaryProfile "runner-notary" \
            --keychain "$MACOS_KEYCHAIN_PATH"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ matrix.rid }}
          path: artifacts/releases/${{ matrix.rid }}
          if-no-files-found: error

      - name: Delete macOS signing keychain
        if: always() && matrix.platform == 'macos'
        shell: bash
        run: |
          if [ -n "$MACOS_KEYCHAIN_PATH" ]; then
            security delete-keychain "$MACOS_KEYCHAIN_PATH" || true
          fi

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/releases

      - name: Upload Velopack assets to GitHub Releases
        shell: bash
        env:
          VPK_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          for rid in win-x64 osx-arm64 osx-x64; do
            vpk upload github \
              --repoUrl "$REPO_URL" \
              --outputDir "artifacts/releases/velopack-$rid" \
              --channel "$rid" \
              --tag "$TAG" \
              --releaseName "Runner $TAG" \
              --merge \
              --publish
          done
